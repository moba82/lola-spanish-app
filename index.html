<script>
async function processSpeech(text) {
    addMessage(text, 'user');
    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: text, lang: currentLang })
        });
        
        const data = await res.json();
        
        if (data.error) {
            // MOSTRA L'ERRORE REALE NELLA CHAT PER DIAGNOSTICA
            addMessage("❌ Errore Tecnico: " + data.error, 'bot');
            return;
        }
        
        speak(data.reply);
    } catch(e) {
        addMessage("❌ Errore di connessione. Verifica di aver fatto il Redeploy su Vercel.", 'bot');
    }
}

</script>
