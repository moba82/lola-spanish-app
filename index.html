<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lola Academy - Personalizada para Zoe</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #fb923c; --orange-dark: #f97316; --pink: #f472b6; --pink-dark: #db2777; --bg: #fff7ed; }
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .screen { display: none; width: 100%; max-width: 480px; animation: fadeIn 0.4s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 25px rgba(251,146,60,0.15); border: 4px solid var(--orange); text-align: center; margin-bottom: 20px; }
        
        .avatar { width: 100px; height: 100px; background: var(--pink); border-radius: 50%; border: 4px solid white; display: flex; align-items: center; justify-content: center; font-size: 50px; margin: 0 auto 15px; box-shadow: 0 5px 15px var(--pink); transition: 0.3s; }
        .talking { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .btn { background: var(--orange); color: white; border: none; padding: 16px; border-radius: 50px; font-weight: 800; cursor: pointer; width: 100%; margin: 8px 0; font-size: 16px; box-shadow: 0 4px 0 var(--orange-dark); transition: 0.2s; }
        .btn-pink { background: var(--pink); box-shadow: 0 4px 0 var(--pink-dark); }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        #chat-box { height: 350px; overflow-y: auto; background: #fffcf9; border: 2px solid var(--pink); border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; text-align: left; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 85%; font-weight: 600; font-size: 15px; line-height: 1.4; }
        .msg.bot { align-self: flex-start; background: var(--pink); color: white; }
        .msg.user { align-self: flex-end; background: var(--orange); color: white; }

        .story-box { background: #fff5f7; padding: 20px; border-radius: 20px; text-align: left; border: 2px dashed var(--pink); margin-bottom: 15px; color: #431407; }
        .opt-btn { background: white; border: 2px solid var(--orange); padding: 12px; border-radius: 15px; margin: 5px 0; width: 100%; cursor: pointer; font-weight: 700; text-align: left; transition: 0.2s; }
        .opt-btn:hover { background: #fff7ed; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="card">
            <div class="avatar">💃</div>
            <h1 style="color:var(--orange-dark); margin:0;">Lola Academy</h1>
            <p>¡Hola Zoe! ¿Qué aventura prefieres hoy?</p>
            <button class="btn" onclick="showScreen('screen-prechat')">🎤 Hablar con Voz</button>
            <button class="btn btn-pink" onclick="showScreen('screen-exercises')">📖 Leer Historias IA</button>
            <button class="btn" onclick="showScreen('screen-housework')" style="background:#ddd; box-shadow:none; color:#666;">🎯 Housework Quiz</button>
        </div>
    </div>

    <div id="screen-prechat" class="screen">
        <div class="card">
            <h2>¿De qué hablamos?</h2>
            <button class="btn" onclick="startChat('mis caballos y equitación')">🐎 Cavalli ed Equitazione</button>
            <button class="btn" onclick="startChat('mi clarinete y la música')">🎶 Clarinetto e Musica</button>
            <button class="btn" onclick="startChat('mis aventuras scout')">⚜️ Scout</button>
            <button class="btn btn-pink" onclick="showScreen('screen-home')">Indietro</button>
        </div>
    </div>

    <div id="screen-chat" class="screen">
        <div class="card" style="padding:15px;">
            <div id="chat-box"></div>
            <button class="btn btn-pink" onclick="toggleListening()" id="mic-btn">🎤 Hablar</button>
            <button class="btn" onclick="showScreen('screen-home')" style="background:#eee; box-shadow:none; color:gray;">Cerrar</button>
        </div>
    </div>

    <div id="screen-exercises" class="screen">
        <div class="card">
            <h2 id="reading-title">Lectura con Lola</h2>
            <div id="reading-content">
                <p>Lola sta scrivendo una storia su di te... ✍️</p>
            </div>
            <button id="next-story-btn" class="btn btn-pink" onclick="generateAIStory()" style="display:none;">Próxima historia</button>
            <button class="btn" onclick="showScreen('screen-home')" style="background:#eee; box-shadow:none; color:gray;">Volver</button>
        </div>
    </div>

    <script>
        let currentTopic = '';
        let currentAns = -1;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-exercises') generateAIStory();
        }

        // --- VOCE DI LOLA (Pitch 1.1) ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'es-ES';
            msg.pitch = 1.1; 
            msg.rate = 0.95; // Leggermente più lenta per chiarezza A2
            
            const voices = window.speechSynthesis.getVoices();
            const girlVoice = voices.find(v => v.lang.includes('es') && (v.name.includes('Lucia') || v.name.includes('Google') || v.name.includes('Monica')));
            if(girlVoice) msg.voice = girlVoice;

            const avatars = document.querySelectorAll('.avatar');
            msg.onstart = () => avatars.forEach(a => a.classList.add('talking'));
            msg.onend = () => avatars.forEach(a => a.classList.remove('talking'));
            
            window.speechSynthesis.speak(msg);
            if(document.getElementById('screen-chat').classList.contains('active')) addMessage(text, 'bot');
        }

        // --- CHAT IA ---
        async function startChat(topic) {
            currentTopic = topic;
            showScreen('screen-chat');
            document.getElementById('chat-box').innerHTML = '';
            speak(`¡Qué guay! Hablemos de ${topic}. ¿Cuál es tu parte favorita?`);
        }

        async function handleBotResponse(userText) {
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText, topic: currentTopic, type: 'chat' })
                });
                const data = await res.json();
                speak(data.reply);
            } catch (e) { speak("Perdona Zoe, mi magia no funciona ahora."); }
        }

        function toggleListening() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-ES';
            rec.onstart = () => document.getElementById('mic-btn').innerText = "🔴 Escuchando...";
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                addMessage(t, 'user');
                handleBotResponse(t);
            };
            rec.onend = () => document.getElementById('mic-btn').innerText = "🎤 Hablar";
            rec.start();
        }

        function addMessage(t, s) {
            const b = document.getElementById('chat-box');
            const d = document.createElement('div');
            d.className = `msg ${s}`;
            d.innerText = t;
            b.appendChild(d);
            b.scrollTop = b.scrollHeight;
        }

        // --- READING DINAMICO CON IA ---
        async function generateAIStory() {
            document.getElementById('next-story-btn').style.display = 'none';
            document.getElementById('reading-content').innerHTML = '<p>✍️ Lola sta inventando una storia per te...</p>';
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'reading' })
                });
                const data = await res.json();
                renderStory(data);
            } catch (e) {
                document.getElementById('reading-content').innerHTML = '<p>⚠️ Errore. Controlla il credito Anthropic.</p>';
            }
        }

        function renderStory(data) {
            currentAns = data.answerIndex;
            let html = `<div class="story-box">${data.story}</div><p style="font-weight:800;">${data.question}</p>`;
            data.options.forEach((o, i) => {
                html += `<button class="opt-btn" onclick="checkReading(${i})">${o}</button>`;
            });
            document.getElementById('reading-content').innerHTML = html;
            speak(data.story);
        }

        function checkReading(i) {
            if(i === currentAns) {
                alert("¡Genial! 🌟 ¡Has entendido todo!");
                document.getElementById('next-story-btn').style.display = 'block';
            } else {
                alert("¡Casi! Prueba otra vez. ❌");
            }
        }

        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
